<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инвентарь: манекен</title>
    <link rel="stylesheet" href="mannequin.css">
  </head>
  <body>
    <section class="hero">
      <div class="hero__equip">
        <div class="hero__slot" data-slot="head"></div>
        <div class="hero__slot" data-slot="body"></div>
        <div class="hero__slot" data-slot="foot"></div>
        <div class="hero__slot" data-slot="back"></div>
        <div class="hero__slot" data-slot="hand-l"></div>
        <div class="hero__slot" data-slot="hand-r">
          <a class="art" href="#">
            <img class="art__img" src="img/gm_sword.png" alt="">
            <span class="art__dur">7/10</span>
          </a>
        </div>
      </div>
      <div class="hero__equip">
        <div class="hero__slot" data-slot="mirror">
          <a class="art" href="#">
            <img class="art__img" src="img/mirror.png" alt="">
            <span class="art__dur">35/41</span>
            <span class="info">i</span>
          </a>
        </div>
        <div class="hero__slot" data-slot="neck"></div>
        <div class="hero__slot" data-slot="ring"></div>
        <div class="hero__slot" data-slot="ring"></div>
        <div class="hero__slot" data-slot="bag"></div>
        <div class="hero__slot" data-slot="transport"></div>
      </div>
    </section>
  </body>
</html>
